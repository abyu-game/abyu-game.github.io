    // Function to render games
    function renderGames(gameArray, containerId) {
        const grid = document.getElementById(containerId);
        grid.innerHTML = ''; // Clear old games
        gameArray.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-thumb">${game.emoji}</div>
                <div class="game-name">${game.name}</div>
            `;
            card.onclick = () => openGame(game.url, game.name);
            grid.appendChild(card);
        });
    }

    // Render all categories
    renderGames(actionGames, 'actionGames');
    renderGames(racingGames, 'racingGames');
    renderGames(sportsGames, 'sportsGames');
    renderGames(planeGames, 'planeGames');
    renderGames(boardGames, 'boardGames');
    renderGames(ioGames, 'ioGames');
    renderGames(classicGames, 'classicGames');

    function openGame(url, name) {
        document.getElementById('gameModal').classList.add('active');
        document.getElementById('gameFrame').src = url;
        document.title = name + ' - Abyu Game';
    }

    function closeGame() {
        document.getElementById('gameModal').classList.remove('active');
        document.getElementById('gameFrame').src = '';
        document.title = 'Abyu Game - Play 100+ Free Games';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeGame();
    });
